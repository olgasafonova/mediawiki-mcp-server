name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            suffix: mac-intel
          - goos: darwin
            goarch: arm64
            suffix: mac-apple-silicon
          - goos: windows
            goarch: amd64
            suffix: windows
            ext: .exe
          - goos: linux
            goarch: amd64
            suffix: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.26'

      - name: Build MCP server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w -X main.ServerVersion=${GITHUB_REF_NAME#v}" -o mediawiki-mcp-server-${{ matrix.suffix }}${{ matrix.ext }} .

      - name: Build wiki CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w -X main.Version=${GITHUB_REF_NAME#v}" -o wiki-${{ matrix.suffix }}${{ matrix.ext }} ./cmd/wiki

      - name: Upload MCP server artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mediawiki-mcp-server-${{ matrix.suffix }}
          path: mediawiki-mcp-server-${{ matrix.suffix }}${{ matrix.ext }}

      - name: Upload wiki CLI artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wiki-${{ matrix.suffix }}
          path: wiki-${{ matrix.suffix }}${{ matrix.ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: binaries
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: binaries/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger MCP Registry publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GITHUB_TOKEN-created releases don't fire release:published events
          # (GitHub anti-recursion). Dispatch mcp-registry.yml explicitly.
          # Strip leading 'v' from tag since mcp-registry.yml expects bare semver.
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Dispatching mcp-registry.yml for ${GITHUB_REF_NAME} (version=${VERSION})"
          gh workflow run mcp-registry.yml \
            --ref "${GITHUB_REF_NAME}" \
            -f version="${VERSION}"
